services:
  - type: web
    name: frnds-api
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm install -g tsx
    startCommand: tsx server/index.ts
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: SEED_SECRET
        generateValue: true
